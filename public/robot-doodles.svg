<svg xmlns="http://www.w3.org/2000/svg" width="480" height="480">
  <!-- All doodles: very subtle blue-grey, low opacity -->

  <!-- 1. Robot head with antenna — top left -->
  <g transform="translate(38, 48) rotate(-8, 20, 22)" fill="none" stroke="#7a94ab" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.13">
    <rect x="2" y="12" width="36" height="26" rx="6"/>
    <rect x="13" y="3" width="12" height="9" rx="3"/>
    <circle cx="20" cy="3" r="2.5" fill="#7a94ab"/>
    <circle cx="14" cy="26" r="4"/>
    <circle cx="26" cy="26" r="4"/>
    <path d="M11 34 Q20 38 29 34"/>
    <line x1="2" y1="20" x2="-4" y2="20"/>
    <line x1="38" y1="20" x2="44" y2="20"/>
  </g>

  <!-- 2. CPU / chip — top right -->
  <g transform="translate(350, 40) rotate(6, 24, 20)" fill="none" stroke="#7a94ab" stroke-width="1.4" stroke-linecap="round" opacity="0.12">
    <rect x="10" y="8" width="28" height="24" rx="4"/>
    <!-- left pins -->
    <line x1="0" y1="13" x2="10" y2="13"/>
    <line x1="0" y1="20" x2="10" y2="20"/>
    <line x1="0" y1="27" x2="10" y2="27"/>
    <!-- right pins -->
    <line x1="38" y1="13" x2="48" y2="13"/>
    <line x1="38" y1="20" x2="48" y2="20"/>
    <line x1="38" y1="27" x2="48" y2="27"/>
    <!-- top pins -->
    <line x1="17" y1="0" x2="17" y2="8"/>
    <line x1="27" y1="0" x2="27" y2="8"/>
    <!-- bottom pins -->
    <line x1="17" y1="32" x2="17" y2="40"/>
    <line x1="27" y1="32" x2="27" y2="40"/>
    <!-- inner detail -->
    <rect x="15" y="13" width="18" height="14" rx="2"/>
  </g>

  <!-- 3. Gear — mid left -->
  <g transform="translate(48, 200) rotate(-12, 18, 18)" fill="none" stroke="#7a94ab" stroke-width="1.5" stroke-linecap="round" opacity="0.12">
    <circle cx="18" cy="18" r="8"/>
    <circle cx="18" cy="18" r="4"/>
    <!-- teeth as small rects -->
    <line x1="18" y1="4" x2="18" y2="9"/>
    <line x1="18" y1="27" x2="18" y2="32"/>
    <line x1="4" y1="18" x2="9" y2="18"/>
    <line x1="27" y1="18" x2="32" y2="18"/>
    <line x1="7.5" y1="7.5" x2="11" y2="11"/>
    <line x1="25" y1="25" x2="28.5" y2="28.5"/>
    <line x1="28.5" y1="7.5" x2="25" y2="11"/>
    <line x1="7.5" y1="28.5" x2="11" y2="25"/>
  </g>

  <!-- 4. Circuit trace — top center -->
  <g transform="translate(185, 55)" fill="none" stroke="#7a94ab" stroke-width="1.3" stroke-linecap="round" opacity="0.11">
    <circle cx="5"  cy="5"  r="3" fill="#7a94ab" opacity="0.5"/>
    <circle cx="45" cy="5"  r="3" fill="#7a94ab" opacity="0.5"/>
    <circle cx="5"  cy="40" r="3" fill="#7a94ab" opacity="0.5"/>
    <circle cx="25" cy="25" r="3" fill="#7a94ab" opacity="0.5"/>
    <circle cx="45" cy="40" r="3" fill="#7a94ab" opacity="0.5"/>
    <line x1="5"  y1="5"  x2="45" y2="5"/>
    <line x1="45" y1="5"  x2="45" y2="40"/>
    <line x1="5"  y1="5"  x2="5"  y2="40"/>
    <line x1="5"  y1="40" x2="25" y2="40"/>
    <line x1="25" y1="25" x2="25" y2="40"/>
    <line x1="25" y1="25" x2="45" y2="25"/>
  </g>

  <!-- 5. Full robot body — center -->
  <g transform="translate(192, 170) rotate(-4, 35, 55)" fill="none" stroke="#7a94ab" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.10">
    <!-- head -->
    <rect x="18" y="5" width="34" height="26" rx="6"/>
    <rect x="28" y="-4" width="14" height="9" rx="3"/>
    <circle cx="35" cy="-4" r="2.5" fill="#7a94ab" opacity="0.5"/>
    <circle cx="28" cy="18" r="4.5"/>
    <circle cx="40" cy="18" r="4.5"/>
    <path d="M25 27 Q34 31 43 27"/>
    <line x1="18" y1="12" x2="12" y2="12"/>
    <line x1="52" y1="12" x2="58" y2="12"/>
    <!-- body -->
    <rect x="10" y="37" width="50" height="38" rx="7"/>
    <rect x="18" y="43" width="34" height="26" rx="4"/>
    <circle cx="28" cy="56" r="3"/>
    <circle cx="40" cy="56" r="3"/>
    <!-- arms -->
    <rect x="-2" y="37" width="10" height="30" rx="5"/>
    <rect x="62" y="37" width="10" height="30" rx="5"/>
    <!-- legs -->
    <rect x="16" y="81" width="15" height="22" rx="5"/>
    <rect x="39" y="81" width="15" height="22" rx="5"/>
  </g>

  <!-- 6. Signal / antenna — right side -->
  <g transform="translate(390, 195)" fill="none" stroke="#7a94ab" stroke-width="1.4" stroke-linecap="round" opacity="0.12">
    <line x1="12" y1="30" x2="12" y2="5"/>
    <path d="M4 13 Q12 5 20 13"/>
    <path d="M0 20 Q12 8 24 20"/>
    <circle cx="12" cy="33" r="3.5" fill="#7a94ab" opacity="0.4"/>
    <line x1="12" y1="37" x2="12" y2="42"/>
    <line x1="6"  y1="42" x2="18" y2="42"/>
  </g>

  <!-- 7. Small robot head — bottom left -->
  <g transform="translate(55, 360) rotate(10, 16, 16)" fill="none" stroke="#7a94ab" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.12">
    <rect x="2" y="8" width="28" height="20" rx="5"/>
    <rect x="10" y="1" width="10" height="7" rx="2"/>
    <circle cx="10" cy="18" r="3.5"/>
    <circle cx="20" cy="18" r="3.5"/>
    <line x1="8" y1="24" x2="22" y2="24"/>
    <circle cx="15" cy="1" r="2" fill="#7a94ab" opacity="0.5"/>
  </g>

  <!-- 8. Battery — bottom right -->
  <g transform="translate(348, 370) rotate(-5, 22, 14)" fill="none" stroke="#7a94ab" stroke-width="1.4" stroke-linecap="round" opacity="0.12">
    <rect x="0" y="5" width="40" height="18" rx="4"/>
    <rect x="40" y="9" width="6" height="10" rx="2"/>
    <rect x="5" y="9" width="12" height="10" rx="2"/>
    <line x1="22" y1="10" x2="22" y2="18"/>
    <line x1="26" y1="14" x2="35" y2="14"/>
  </g>

  <!-- 9. Circuit trace — bottom center -->
  <g transform="translate(185, 390)" fill="none" stroke="#7a94ab" stroke-width="1.3" stroke-linecap="round" opacity="0.10">
    <circle cx="0"  cy="15" r="3" fill="#7a94ab" opacity="0.45"/>
    <circle cx="20" cy="15" r="3" fill="#7a94ab" opacity="0.45"/>
    <circle cx="40" cy="15" r="3" fill="#7a94ab" opacity="0.45"/>
    <circle cx="20" cy="0"  r="3" fill="#7a94ab" opacity="0.45"/>
    <circle cx="20" cy="30" r="3" fill="#7a94ab" opacity="0.45"/>
    <line x1="0" y1="15" x2="40" y2="15"/>
    <line x1="20" y1="0"  x2="20" y2="30"/>
  </g>

  <!-- 10. Small gear — top center-right -->
  <g transform="translate(295, 170) rotate(20, 14, 14)" fill="none" stroke="#7a94ab" stroke-width="1.3" stroke-linecap="round" opacity="0.11">
    <circle cx="14" cy="14" r="6"/>
    <circle cx="14" cy="14" r="3"/>
    <line x1="14" y1="3"  x2="14" y2="7"/>
    <line x1="14" y1="21" x2="14" y2="25"/>
    <line x1="3"  y1="14" x2="7"  y2="14"/>
    <line x1="21" y1="14" x2="25" y2="14"/>
    <line x1="6"  y1="6"  x2="8.8" y2="8.8"/>
    <line x1="19.2" y1="19.2" x2="22" y2="22"/>
    <line x1="22" y1="6"  x2="19.2" y2="8.8"/>
    <line x1="6"  y1="22" x2="8.8" y2="19.2"/>
  </g>

</svg>
